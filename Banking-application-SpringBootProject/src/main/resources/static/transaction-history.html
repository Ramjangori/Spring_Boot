<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaBank — Transaction History</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>

:root {
  --navy:   #0a1628;
  --blue:   #1a56db;
  --accent: #3b82f6;
  --gold:   #f5c842;
  --teal:   #06b6d4;
  --green:  #10b981;
  --card:   #182236;
  --border: rgba(255,255,255,0.07);
  --text:   #e2e8f0;
  --muted:  #8a9ab5;
  --glow:   rgba(59,130,246,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  margin:20px;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% -10%, rgba(26,86,219,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(6,182,212,0.12) 0%, transparent 55%);
  pointer-events: none;
}

/* Topbar */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,22,40,0.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem; height: 68px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff; box-shadow: 0 0 18px var(--glow);
}
.brand-name { font-size: 1.2rem; font-weight: 700; color: #fff; }
.brand-name span { color: var(--gold); }
.back-btn {
  display: flex; align-items: center; gap: 7px;
  color: var(--muted); text-decoration: none; font-size: 0.85rem;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 14px; transition: all 0.2s; background: var(--card);
}
.back-btn:hover { color: #fff; border-color: var(--accent); }

/* Page */
.page {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto;
  padding: 40px 24px;
}

/* Search row */
.search-row {
  display: flex; gap: 12px; margin-bottom: 20px;
}
.search-wrap { flex: 1; position: relative; }
.search-wrap i {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  color: var(--muted);
}
.search-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px 11px 38px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; outline: none; transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--accent); }
.load-btn {
  background: linear-gradient(135deg, var(--blue), var(--accent));
  color: #fff; border: none; border-radius: 10px;
  padding: 11px 22px; font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  transition: opacity 0.2s;
}
.load-btn:hover { opacity: 0.85; }

/* Table card */
.table-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}

.tx-table { width: 100%; border-collapse: collapse; }
.tx-table thead tr { background: rgba(255,255,255,0.04); }
.tx-table th {
  padding: 12px 18px; text-align: left;
  font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); border-bottom: 1px solid var(--border);
}
.tx-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
.tx-table tbody tr:last-child { border-bottom: none; }
.tx-table tbody tr:hover { background: rgba(255,255,255,0.03); }
.tx-table td { padding: 13px 18px; font-size: 0.87rem; color: var(--text); }

.badge-credit {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25);
  color: var(--green); border-radius: 20px; padding: 3px 10px;
  font-size: 0.75rem; font-weight: 600;
}
.badge-debit {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25);
  color: #f87171; border-radius: 20px; padding: 3px 10px;
  font-size: 0.75rem; font-weight: 600;
}
.amt-cr { color: var(--green); font-weight: 600; }
.amt-dr { color: #f87171;      font-weight: 600; }
.muted   { color: var(--muted); }

/* Empty state */
.empty-state {
  padding: 48px; text-align: center; color: var(--muted); font-size: 0.88rem;
}
.empty-state i { font-size: 2rem; display: block; margin-bottom: 10px; }
</style>
</head>
<body>

<nav class="topbar">
  <a class="brand" href="index.html">
    <div class="brand-icon"><i class="bi bi-bank2"></i></div>
    <span class="brand-name">Rupee<span>Flow</span></span>
  </a>
  <a href="dashboard.html" class="back-btn">
    <i class="bi bi-arrow-left"></i> Back to Dashboard
  </a>
</nav>

<div class="page">
    <button class="load-btn" onclick="loadHistory()">
      <i class="bi bi-clock-history"></i> Your Transaction History
    </button>
  </div>

  <div class="table-card">
    <table class="tx-table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Amount</th>
          <th>From Account</th>
          <th>To Account</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="historyTable">
        <tr>
          <td colspan="5">
            <div class="empty-state">
              <i class="bi bi-clock-history"></i>
              Enter account number to load transactions
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  window.onload = function () {
  const accountNumber = localStorage.getItem("accountNumber");

  fetch("http://localhost:9090/accounts/" + accountNumber + "/transactions")
    .then(res => res.json())
    .then(data => {
      let rows = "";

      data.forEach(t => {
        const isCredit = t.toAccount && t.toAccount.accountNumber === accountNumber;
        const type     = isCredit ? "CREDIT" : "DEBIT";
        const badge    = isCredit
          ? `<span class="badge-credit"><i class="bi bi-arrow-down-left"></i>${type}</span>`
          : `<span class="badge-debit"><i class="bi bi-arrow-up-right"></i>${type}</span>`;
        const amtCls   = isCredit ? "amt-cr" : "amt-dr";
        const amtSign  = isCredit ? "+" : "−";

        rows += `
          <tr>
            <td>${badge}</td>
            <td class="${amtCls}">${amtSign} ₹${t.amount}</td>
            <td class="muted">${t.fromAccount ? t.fromAccount.accountNumber : "-"}</td>
            <td class="muted">${t.toAccount   ? t.toAccount.accountNumber   : "-"}</td>
            <td class="muted">${t.transactionDate}</td>
          </tr>`;
      });

      document.getElementById("historyTable").innerHTML = rows;
    })
    .catch(error => {
      console.log(error);
      document.getElementById("historyTable").innerHTML = `
        <tr><td colspan="5">
          <div class="empty-state">
            <i class="bi bi-exclamation-circle"></i>
            No Transaction Found
          </div>
        </td></tr>`;
    });
}
</script>

</body>
</html>
