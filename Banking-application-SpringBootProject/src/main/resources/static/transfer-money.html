<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RupeeFlow — Transfer Money</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>

:root {
  --navy:   #0a1628;
  --blue:   #1a56db;
  --accent: #3b82f6;
  --gold:   #f5c842;
  --teal:   #06b6d4;
  --green:  #10b981;
  --card:   #182236;
  --border: rgba(255,255,255,0.07);
  --text:   #e2e8f0;
  --muted:  #8a9ab5;
  --glow:   rgba(59,130,246,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% -10%, rgba(26,86,219,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(6,182,212,0.12) 0%, transparent 55%);
  pointer-events: none;
}

/* Topbar */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,22,40,0.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem; height: 68px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff; box-shadow: 0 0 18px var(--glow);
}
.brand-name { font-size: 1.2rem; font-weight: 700; color: #fff; }
.brand-name span { color: var(--gold); }
.back-btn {
  display: flex; align-items: center; gap: 7px;
  color: var(--muted); text-decoration: none; font-size: 0.85rem;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 14px; transition: all 0.2s; background: var(--card);
}
.back-btn:hover { color: #fff; border-color: var(--accent); }

/* Page */
.page {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto;
  padding: 40px 24px;
  animation: fadeUp 0.6s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

/* Card */
.form-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px; overflow: hidden;
}

.card-top {
  background: linear-gradient(120deg, #0f2040 0%, #1a3a6e 50%, #0a2240 100%);
  border-bottom: 1px solid var(--border);
  padding: 26px 28px;
  position: relative; overflow: hidden;
}
.card-top::before {
  content: '';
  position: absolute; right: -30px; top: -30px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
.card-top-icon {
  width: 46px; height: 46px; border-radius: 13px;
  background: rgba(245,200,66,0.15); border: 1px solid rgba(245,200,66,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; color: var(--gold); margin-bottom: 12px;
  position: relative; z-index: 1;
}
.card-top h2 {
  font-size: 1.2rem; font-weight: 700; color: #fff;
  position: relative; z-index: 1;
}
.card-top p {
  font-size: 0.8rem; color: var(--muted); margin-top: 3px;
  position: relative; z-index: 1;
}

.card-body { padding: 26px 28px; display: flex; flex-direction: column; gap: 16px; }

/* Inputs */
.field label {
  display: block; font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 7px;
}
.input-wrap { position: relative; }
.input-wrap i {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 1rem; pointer-events: none;
}
.field input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px 12px 40px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem; outline: none; transition: border-color 0.2s;
}
.field input::placeholder { color: var(--muted); }
.field input:focus { border-color: var(--accent); background: rgba(59,130,246,0.06); }

/* Divider arrow */
.arrow-divider {
  display: flex; justify-content: center; margin: -4px 0;
}
.arrow-divider span {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.25);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 0.9rem;
}

/* Transfer btn */
.transfer-btn {
  width: 100%; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--blue), var(--accent));
  color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem; font-weight: 600; padding: 13px;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 8px;
  transition: opacity 0.2s, transform 0.2s;
  margin-top: 4px;
}
.transfer-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* Result */
#result {
  margin-top: 16px; border-radius: 10px;
  padding: 14px 16px; font-size: 0.88rem;
  display: none;
}
#result.success {
  background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25);
  color: var(--green); display: flex; align-items: center; gap: 8px;
}
#result.error {
  background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25);
  color: #f87171; display: flex; align-items: center; gap: 8px;
}
</style>
</head>
<body>

<!-- Topbar -->
<nav class="topbar">
  <a class="brand" href="index.html">
    <div class="brand-icon"><i class="bi bi-bank2"></i></div>
    <span class="brand-name">Rupee<span>Flow</span></span>
  </a>
  <a href="dashboard.html" class="back-btn">
    <i class="bi bi-arrow-left"></i> Back to Dashboard
  </a>
</nav>

<div class="page">
  <div class="form-card">

    <div class="card-top">
      <div class="card-top-icon"><i class="bi bi-send-fill"></i></div>
      <h2>Transfer Money</h2>
      <p>Send funds instantly to any account</p>
    </div>

    <div class="card-body">

      <div class="field">
        <label>From Account</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <label>Enter Reciever Details</label>
        </div>
      </div>

      <div class="arrow-divider">
        <span><i class="bi bi-arrow-down"></i></span>
      </div>

      <div class="field">
        <label>To Account</label>
        <div class="input-wrap">
          <i class="bi bi-person-check"></i>
          <input type="text" id="toAccount" placeholder="To Account">
        </div>
      </div>

      <div class="field">
        <label>Amount</label>
        <div class="input-wrap">
          <i class="bi bi-currency-rupee"></i>
          <input type="text" id="amount" placeholder="Amount">
        </div>
      </div>

      <button class="transfer-btn" onclick="transferMoney()">
        <i class="bi bi-send-fill"></i> Transfer
      </button>

      <div id="result"></div>

    </div>
  </div>
</div>

<script>
function transferMoney() {
  const fromAccount = localStorage.getItem("accountNumber");
  fetch("http://localhost:9090/accounts/transfer", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      fromAccount: fromAccount,
      toAccount:   document.getElementById("toAccount").value,
      amount:      document.getElementById("amount").value
    })
  })
  .then(res => res.text())
  .then(data => {
    const el = document.getElementById("result");
    el.className = "success";
    el.innerHTML = `<i class="bi bi-check-circle-fill"></i> ${data}`;
	
	setTimeout(() => {
	        window.location.href = "dashboard.html";
	    }, 2000); // 2 second baad redirect
  })
  .catch(() => {
    const el = document.getElementById("result");
    el.className = "error";
    el.innerHTML = `<i class="bi bi-x-circle-fill"></i> Transfer failed. Please try again.`;
  });
}
</script>

</body>
</html>
