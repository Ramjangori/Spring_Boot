<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaBank — Account Details</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>

:root {
  --navy:   #0a1628;
  --blue:   #1a56db;
  --accent: #3b82f6;
  --gold:   #f5c842;
  --teal:   #06b6d4;
  --green:  #10b981;
  --card:   #182236;
  --border: rgba(255,255,255,0.07);
  --text:   #e2e8f0;
  --muted:  #8a9ab5;
  --glow:   rgba(59,130,246,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% -10%, rgba(26,86,219,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(6,182,212,0.12) 0%, transparent 55%);
  pointer-events: none;
}

/* Topbar */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,22,40,0.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem; height: 68px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff; box-shadow: 0 0 18px var(--glow);
}
.brand-name { font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
.brand-name span { color: var(--gold); }
.back-btn {
  display: flex; align-items: center; gap: 7px;
  color: var(--muted); text-decoration: none; font-size: 0.85rem;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 14px; transition: all 0.2s; background: var(--card);
}
.back-btn:hover { color: #fff; border-color: var(--accent); }

/* Page */
.page {
  position: relative; z-index: 1;
  max-width: 780px; margin: 0 auto;
  padding: 40px 24px;
  animation: fadeUp 0.6s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

/* Search card */
.search-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 24px;
  margin-bottom: 24px;
}
.search-card label {
  font-size: 0.78rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); display: block; margin-bottom: 10px;
}
.input-row { display: flex; gap: 12px; }
.input-wrap { flex: 1; position: relative; }
.input-wrap i {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 1rem;
}
.search-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px 12px 40px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; outline: none; transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--accent); background: rgba(59,130,246,0.06); }
.search-btn {
  background: linear-gradient(135deg, var(--blue), var(--accent));
  color: #fff; border: none; border-radius: 10px;
  padding: 12px 24px; font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: opacity 0.2s, transform 0.2s; white-space: nowrap;
}
.search-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* Result */
#result { animation: fadeUp 0.4s ease both; }

/* Account card */
.account-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}

.balance-section {
  background: linear-gradient(120deg, #0f2040 0%, #1a3a6e 50%, #0a2240 100%);
  border-bottom: 1px solid var(--border);
  padding: 32px; text-align: center;
  position: relative; overflow: hidden;
}
.balance-section::before {
  content: '';
  position: absolute; right: -40px; top: -40px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
.balance-label { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
.balance-amount {
  font-size: 2.4rem; font-weight: 700; color: #fff;
  margin-top: 8px; letter-spacing: -0.01em;
}
.balance-amount span { font-size: 1.3rem; color: var(--muted); }
.balance-status {
  margin-top: 10px;
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25);
  border-radius: 20px; padding: 4px 14px;
  font-size: 0.75rem; font-weight: 600; color: var(--green);
}

.details-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 1px; background: var(--border);
}
.detail-box {
  background: var(--card);
  padding: 20px 24px;
}
.detail-box .d-label {
  font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 6px;
}
.detail-box .d-value {
  font-size: 0.95rem; font-weight: 600; color: #fff;
}

/* Error state */
.error-state {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px; text-align: center;
}
.error-icon {
  width: 54px; height: 54px; border-radius: 16px;
  background: rgba(248,113,113,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; color: #f87171; margin: 0 auto 14px;
}
.error-state h4 { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 5px; }
.error-state p  { font-size: 0.82rem; color: var(--muted); }

@media (max-width: 500px) {
  .details-grid { grid-template-columns: 1fr; }
  .input-row { flex-direction: column; }
  .search-btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<!-- Topbar -->
<nav class="topbar">
  <a class="brand" href="index.html">
    <div class="brand-icon"><i class="bi bi-bank2"></i></div>
    <span class="brand-name">Rupee<span>Flow</span></span>
  </a>
  <a href="dashboard.html" class="back-btn">
    <i class="bi bi-arrow-left"></i> Back to Dashboard
  </a>
</nav>

<div class="page">

  <!-- Result -->
  <div id="result"></div>

</div>

<script>
	
	window.onload = function(){

	    const accountNumber =
	        localStorage.getItem("accountNumber");

	    if(!accountNumber){

	        window.location.href = "dashboard.html";
	        return;
	    }

	    fetch(
	        "http://localhost:9090/accounts/" +
	        accountNumber
	    )

	    .then(res => res.json())

	    .then(data => {

	        document.getElementById("result").innerHTML = `
	        <div class="account-card">

	          <div class="balance-section">

	            <div class="balance-label">
	                Current Balance
	            </div>

	            <div class="balance-amount">
	                <span>₹</span>
	                ${Number(data.balance).toLocaleString('en-IN')}
	            </div>

	            <div class="balance-status">
	                <i class="bi bi-patch-check-fill"></i>
	                Active Account
	            </div>

	          </div>

	          <div class="details-grid">

	            <div class="detail-box">
	              <div class="d-label">
	                  Account Number
	              </div>
	              <div class="d-value">
	                  ${data.accountNumber}
	              </div>
	            </div>

	            <div class="detail-box">
	              <div class="d-label">
	                  Account Holder
	              </div>
	              <div class="d-value">
	                  ${data.holderName}
	              </div>
	            </div>

	            <div class="detail-box">
	              <div class="d-label">
	                  Created At
	              </div>
	              <div class="d-value">
	                  ${data.createdAt}
	              </div>
	            </div>

	            <div class="detail-box">
	              <div class="d-label">
	                  Account Type
	              </div>
	              <div class="d-value">
	                  Savings
	              </div>
	            </div>

	          </div>

	        </div>`;
	    });

	}
	

</script>

</body>
</html>
