<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RupeeFlow - Add Existing Account</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

	<style>
		body {
			background: linear-gradient(135deg, #071426, #0b2545);
			min-height: 100vh;
			font-family: 'Segoe UI', sans-serif;
			color: white;
		}

		.navbar {
			background: rgba(0, 0, 0, 0.2);
			backdrop-filter: blur(10px);
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		.brand {
			color: white;
			font-size: 28px;
			font-weight: bold;
			text-decoration: none;
		}

		.brand span {
			color: #f7c948;
		}

		.main-card {
			width: 450px;
			margin: auto;
			margin-top: 80px;
			background: #16233b;
			border-radius: 20px;
			overflow: hidden;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
		}

		.card-header {
			background: linear-gradient(135deg, #1d4ed8, #2563eb);
			padding: 30px;
		}

		.card-header h2 {
			margin-top: 10px;
			font-size: 32px;
		}

		.card-header p {
			color: #dbeafe;
		}

		.card-body {
			padding: 30px;
		}

		.form-label {
			color: #b8c2d9;
			font-size: 14px;
			font-weight: 600;
		}

		.input-wrap {
			position: relative;
		}

		.input-wrap i {
			position: absolute;
			left: 15px;
			top: 50%;
			transform: translateY(-50%);
			color: #b8c2d9;
		}

		.form-control {
			background: #24314d;
			border: 1px solid #4b5b7c;
			color: white;
			padding-left: 45px;
			height: 50px;
		}

		.form-control::placeholder {
			color: #b8c2d9;
		}

		.form-control:focus {
			background: #2c3b5c;
			color: white;
			border-color: #3b82f6;
			box-shadow: none;
		}

		.btn-continue {
			width: 100%;
			height: 50px;
			border: none;
			border-radius: 10px;
			background: linear-gradient(135deg, #2563eb, #3b82f6);
			color: white;
			font-weight: bold;
			margin-top: 20px;
		}

		#result {
			margin-top: 15px;
			text-align: center;
			font-weight: bold;
		}

		.back-btn {
			border: 1px solid rgba(255, 255, 255, 0.2);
			color: white;
			text-decoration: none;
			padding: 8px 14px;
			border-radius: 8px;
		}
	</style>
</head>

<body>

	<nav class="navbar navbar-expand-lg">
		<div class="container">

			<a href="index.html" class="brand">
				Nexa<span>Bank</span>
			</a>

			<a href="index.html" class="back-btn">
				Back To Home
			</a>

		</div>
	</nav>

	<div class="main-card">

		<div class="card-header">

			<i class="bi bi-person-check-fill fs-1"></i>

			<h2>Add Existing Account</h2>

			<p>Enter your account number to continue</p>

		</div>

		<div class="card-body">

			<label class="form-label">
				ACCOUNT NUMBER
			</label>

			<div class="input-wrap">

				<i class="bi bi-credit-card"></i>

				<input type="text" id="accountNumber" class="form-control" placeholder="Enter Account Number">

			</div>

			<button class="btn-continue" onclick="addAccount()">

				Continue

			</button>

			<div id="result"></div>

		</div>

	</div>

	<script>

		function addAccount() {

			let accountNumber =
				document.getElementById("accountNumber").value;

			fetch(
				"http://localhost:9090/accounts/" +
				accountNumber
			)

				.then(res => {

					if (!res.ok) {
						throw new Error("Account Not Found");
					}

					return res.json();

				})

				.then(data => {

					localStorage.setItem(
						"holderName",
						data.holderName
					);

					localStorage.setItem(
						"accountNumber",
						data.accountNumber
					);

					document.getElementById("result")
						.innerHTML =
						"Account Added Successfully...";

					setTimeout(() => {

						window.location.href =
							"dashboard.html";

					}, 1500);

				})

				.catch(error => {

					document.getElementById("result")
						.innerHTML =
						"Invalid Account Number";

				});

		}

	</script>

</body>

</html>
