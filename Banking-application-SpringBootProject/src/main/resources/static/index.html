<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaBank — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>

:root {
  --navy:   #0a1628;
  --blue:   #1a56db;
  --accent: #3b82f6;
  --gold:   #f5c842;
  --teal:   #06b6d4;
  --green:  #10b981;
  --card:   #182236;
  --border: rgba(255,255,255,0.07);
  --text:   #e2e8f0;
  --muted:  #8a9ab5;
  --glow:   rgba(59,130,246,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% -10%, rgba(26,86,219,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(6,182,212,0.12) 0%, transparent 55%);
  pointer-events: none;
}

/* Topbar */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,22,40,0.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem; height: 68px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff; box-shadow: 0 0 18px var(--glow);
}
.brand-name { font-size: 1.2rem; font-weight: 700; color: #fff; }
.brand-name span { color: var(--gold); }
.avatar {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--blue), #7c3aed);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 14px; color: #fff;
  border: 2px solid var(--border);
}

/* Page */
.page {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 36px 24px;
  display: flex; flex-direction: column; gap: 24px;
}

/* Welcome card */
.welcome-card {
  background: linear-gradient(120deg, #0f2040 0%, #1a3a6e 50%, #0a2240 100%);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 16px; padding: 28px 32px;
  position: relative; overflow: hidden;
}
.welcome-card::before {
  content: '';
  position: absolute; right: -40px; top: -40px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
.welcome-name {
  font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 6px;
}
.welcome-acc {
  font-size: 0.85rem; color: var(--muted);
  display: flex; align-items: center; gap: 8px;
}
.acc-chip {
  background: rgba(255,255,255,0.07); border: 1px solid var(--border);
  border-radius: 6px; padding: 2px 10px; font-size: 0.82rem; color: var(--text);
}

/* Guest banner */
.guest-banner {
  background: var(--card);
  border: 1px dashed rgba(59,130,246,0.35);
  border-radius: 16px; padding: 22px 28px;
  display: flex; align-items: center; gap: 16px;
}
.guest-icon {
  width: 46px; height: 46px; border-radius: 12px;
  background: rgba(59,130,246,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; color: var(--accent); flex-shrink: 0;
}
.guest-text h4 { font-size: 0.95rem; font-weight: 600; color: #fff; margin-bottom: 3px; }
.guest-text p  { font-size: 0.8rem; color: var(--muted); }

/* Section label */
.section-label {
  font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted);
  margin-bottom: 12px;
}

/* Action grid */
.action-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
}
.action-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 26px 16px;
  text-align: center; text-decoration: none;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  transition: all 0.25s; position: relative; overflow: hidden;
}
.action-btn::before {
  content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.25s;
}
.action-btn:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.14); }
.action-btn:hover::before { opacity: 1; }

.ab-blue::before   { background: radial-gradient(circle at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 70%); }
.ab-green::before  { background: radial-gradient(circle at 50% 0%, rgba(16,185,129,0.12) 0%, transparent 70%); }
.ab-yellow::before { background: radial-gradient(circle at 50% 0%, rgba(245,200,66,0.10) 0%, transparent 70%); }
.ab-teal::before   { background: radial-gradient(circle at 50% 0%, rgba(6,182,212,0.12) 0%, transparent 70%); }

.btn-icon {
  width: 50px; height: 50px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; position: relative; z-index: 1;
}
.bi-blue   { background: rgba(59,130,246,0.15); color: var(--accent); }
.bi-green  { background: rgba(16,185,129,0.15); color: var(--green);  }
.bi-yellow { background: rgba(245,200,66,0.15); color: var(--gold);   }
.bi-teal   { background: rgba(6,182,212,0.15);  color: var(--teal);   }

.btn-label {
  font-size: 0.85rem; font-weight: 600; color: #fff;
  z-index: 1; line-height: 1.3; text-align: center;
}

@media (max-width: 600px) {
  .action-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav class="topbar">
  <a class="brand" href="#">
    <div class="brand-icon"><i class="bi bi-bank2"></i></div>
    <span class="brand-name">Rupee<span>Flow</span></span>
  </a>
  <div class="avatar" id="avatarEl">G</div>
</nav>

<div class="page">

  <!-- Guest -->
  <div class="guest-banner" id="guestBanner">
    <div class="guest-icon"><i class="bi bi-person-circle"></i></div>
    <div class="guest-text">
      <h4>Welcome to NexaBank</h4>
      <p>Create an account to get started with your personal banking dashboard.</p>
    </div>
  </div>

  <!-- Logged in -->
  <div class="welcome-card" id="welcomeBanner" style="display:none">
    <div class="welcome-name" id="welcomeText">Welcome Guest</div>
    <div class="welcome-acc" id="accountText"></div>
  </div>

  <!-- Actions -->
  <div>
    <div class="section-label">Quick Banking Services</div>
    <div class="action-grid">

      <a id="createBtn" href="create-account.html" class="action-btn ab-blue">
        <div class="btn-icon bi-blue"><i class="bi bi-person-plus-fill"></i></div>
        <div class="btn-label">Create Account</div>
      </a>

      <a href="addAccount.html" class="action-btn ab-green">
        <div class="btn-icon bi-green"><i class="bi bi-person-vcard-fill"></i></div>
        <div class="btn-label">Add Existing Account</div>
      </a>

    </div>
  </div>

</div>

<script>

</script>

</body>
</html>
