<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Management System</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:40px;
}

input{
    padding:10px;
    margin:5px;
    width:250px;
}

button{
    padding:10px 15px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid black;
}

th,td{
    padding:10px;
    text-align:center;
}

</style>

</head>
<body>

<h1>Book Management System</h1>

<h3>Add / Update Book</h3>

<input type="text" id="name" placeholder="Book Name">
<input type="text" id="author" placeholder="Author">
<input type="number" id="price" placeholder="Price">
<input type="text" id="publication" placeholder="Publication">

<button id="saveBtn" onclick="saveBook()">Add Book</button>

<hr>

<h3>All Books</h3>

<table>

<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Author</th>
    <th>Price</th>
    <th>Publication</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="bookTable"></tbody>

</table>

<script>

const API = "/books";

let books = [];
let updateId = null;

window.onload = loadBooks;

async function loadBooks(){

    const response = await fetch(`${API}/show`);

    books = await response.json();

    let rows = "";

    books.forEach(book => {

        rows += `
        <tr>

            <td>${book.id}</td>
            <td>${book.name}</td>
            <td>${book.author}</td>
            <td>${book.price}</td>
            <td>${book.publication}</td>

            <td>

                <button onclick="editBook(${book.id})">
                    Edit
                </button>

                <button onclick="deleteBook(${book.id})">
                    Delete
                </button>

            </td>

        </tr>
        `;
    });

    document.getElementById("bookTable").innerHTML = rows;
}

async function saveBook(){

    const book = {

        name : document.getElementById("name").value,
        author : document.getElementById("author").value,
        price : document.getElementById("price").value,
        publication : document.getElementById("publication").value
    };

    if(updateId == null){

        await fetch(`${API}/add`,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(book)
        });

    }else{

        await fetch(`${API}/update/${updateId}`,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(book)
        });

        updateId = null;

        document.getElementById("saveBtn").innerText = "Add Book";
    }

    clearForm();

    loadBooks();
}

function editBook(id){

    const book = books.find(b => b.id == id);

    document.getElementById("name").value = book.name;
    document.getElementById("author").value = book.author;
    document.getElementById("price").value = book.price;
    document.getElementById("publication").value = book.publication;

    updateId = id;

    document.getElementById("saveBtn").innerText = "Update Book";
}

async function deleteBook(id){

    await fetch(`${API}/delete/${id}`,{
        method:"DELETE"
    });

    loadBooks();
}

function clearForm(){

    document.getElementById("name").value = "";
    document.getElementById("author").value = "";
    document.getElementById("price").value = "";
    document.getElementById("publication").value = "";
}

</script>

</body>
</html>
