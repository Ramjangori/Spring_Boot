<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

.login-container{
    width:350px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.login-container h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.input-group input:focus{
    outline:none;
    border-color:#007bff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.register-link{
    text-align:center;
    margin-top:15px;
}

.register-link a{
    text-decoration:none;
    color:#007bff;
}

.register-link a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="login-container">

    <h2>Login</h2>

    <form action="/login" method="post">

        <div class="input-group">
            <input type="text" name="username" placeholder="Enter Username" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="register-link">
        <p>Don't have an account? <a href="/register.html">Register</a></p>
    </div>

</div>

</body>
</html>
